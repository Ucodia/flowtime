<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>~ flowtime ~</title>
  <script language="javascript" src="flowtime.umd.js"></script>
  <style>
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    #content {
      font-size: 5.0rem;
      text-align: center;
    }
    #check {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="content"></div>
  <button id="check">Reality Check</button>
  <script language="javascript">
    (function() {
      var content = document.getElementById('content');
      var check = document.getElementById('check');
      var showRealTime = false;

      function updateTime() {
        var now = new Date();
        var time = showRealTime ? now : flowtime.fromDate(now).toDate();
        content.textContent = time.toLocaleTimeString();
      }

      updateTime();
      setInterval(updateTime, 1000);
      check.onmousedown = function(){ showRealTime = true; updateTime(); };
      check.onmouseup = function(){ showRealTime = false; updateTime(); };
    })();
  </script>
</body>
</html>
